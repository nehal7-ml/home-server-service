events {}

http {
    # Route for Stirling PDF
    server {
        listen 80;
        server_name pdf.home.server;

        client_max_body_size 100M;
        proxy_read_timeout 600s;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;

        location / {
            proxy_pass http://bentopdf:8080;
            proxy_set_header Host $host;
        }
    }

    
    server {
    listen 80;
    server_name stats.home.server;

    location / {
        # 172.17.0.1 is the default IP of the host from Nginx's perspective
        proxy_pass http://beszel:8090;
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Headers for identity and security
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep the connection alive for agents
        proxy_read_timeout 86400s; # 24 hours
        proxy_send_timeout 86400s;
        
        # Essential for real-time streaming
        proxy_buffering off;
        
       
    }
}

}
